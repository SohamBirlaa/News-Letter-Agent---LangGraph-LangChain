[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
markers = [
    "unit: Unit tests (no external services required)",
    "integration: Integration tests (Flask test client)",
    "e2e: End-to-end tests (requires running Flask server + Chrome)",
]