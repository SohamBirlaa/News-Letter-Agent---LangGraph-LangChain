<!DOCTYPE html>
<html>
<head>
    <title>Newsletter Agent</title>

<style>
* { box-sizing: border-box; }

body {
    margin:0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(120deg,#eef2f7,#fdfbfb);
}

/* Layout */
.container {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: #111827;
    color: white;
    padding: 20px;
    overflow-y: auto;
}
.sidebar h2 { margin-top:0; }
.history-item {
    background:#1f2937;
    padding:10px;
    border-radius:6px;
    margin-bottom:10px;
    cursor:pointer;
}
.history-item:hover { background:#374151; }

/* Main */
.main {
    flex:1;
    padding:40px;
    overflow-y:auto;
}

textarea {
    width:100%;
    height:100px;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

button {
    padding:10px 18px;
    border:none;
    border-radius:8px;
    margin-top:12px;
    margin-right:10px;
    cursor:pointer;
    font-weight:600;
}

.run { background:#2563eb; color:white; }
.approve { background:#16a34a; color:white; }

.card {
    background:white;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
    white-space:pre-wrap;
}

#status { font-weight:bold; margin-top:15px; color:#2563eb; }

.loader {
  border:4px solid #eee;
  border-top:4px solid #2563eb;
  border-radius:50%;
  width:22px;
  height:22px;
  animation:spin 1s linear infinite;
  display:inline-block;
}
@keyframes spin { 100% { transform: rotate(360deg);} }
</style>
</head>

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">
    <h2>📚 History</h2>
    <div id="history"></div>
</div>

<!-- Main Content -->
<div class="main">

<h1>📰 Newsletter Agent</h1>

<textarea id="goal" placeholder="Create a weekly AI Agents newsletter..."></textarea>
<br>
<button class="run" onclick="runAgent()">🚀 Run Agent</button>
<button class="approve" onclick="approveAgent()">✅ Approve</button>

<p id="status"></p>

<div class="card">
<h3>🤖 Agent Output</h3>
<div id="output">No output yet.</div>
</div>

<div class="card">
<h3>📄 newsletter.md</h3>
<div id="fileOutput">No file yet.</div>
</div>

</div>
</div>

<script>

/* Load newsletter file */
async function loadFile() {
    const res = await fetch("/get-newsletter-file");
    const data = await res.json();
    document.getElementById("fileOutput").innerText = data.file;
}

/* Load history */
async function loadHistory() {
    const res = await fetch("/history");
    const rows = await res.json();
    const div = document.getElementById("history");
    div.innerHTML = "";

    rows.forEach(r => {
        const item = document.createElement("div");
        item.className = "history-item";
        item.innerText = r[1] + " (" + r[2] + ")";
        item.onclick = () => openNewsletter(r[0]);
        div.appendChild(item);
    });
}

/* Open old newsletter */
async function openNewsletter(id) {
    const res = await fetch("/newsletter/" + id);
    const data = await res.json();
    document.getElementById("output").innerText = data.content;
}

/* Run Agent */
async function runAgent() {
    const goal = document.getElementById("goal").value;
    if (!goal) return alert("Enter goal");

    document.getElementById("status").innerHTML =
        '<span class="loader"></span> Agent working...';

    const res = await fetch("/run-agent", {
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({goal})
    });

    const data = await res.json();

    document.getElementById("status").innerText =
        "⏸ Waiting for approval";

    document.getElementById("output").innerText =
        data.draft_newsletter;
}

/* Approve Agent */
async function approveAgent() {
    const goal = document.getElementById("goal").value;
    if (!goal) return alert("Run agent first");

    document.getElementById("status").innerHTML =
        '<span class="loader"></span> Finalizing...';

    const res = await fetch("/approve", {
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({goal})
    });

    const data = await res.json();

    document.getElementById("status").innerText =
        "🎉 Newsletter saved!";

    document.getElementById("output").innerText =
        data.newsletter;

    loadFile();
    loadHistory();
}

loadFile();
loadHistory();

</script>

</body>
</html>
